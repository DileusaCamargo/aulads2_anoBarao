<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exemplo de Gradiente Moderno</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* Gradiente linear moderno em diagonal */
             background: linear-gradient(180deg, #F7F4EB 0%, #EAE3D2 100%);
            color: rgb(39, 38, 38);
        }

        .card {
            background: linear-gradient(105deg, #e4bb69 0%, #F5F0E6 100%);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Visual Moderno</h1>
        <p>Este é um exemplo de fundo usando um gradiente linear sutil e elegante.</p>
    </div>

</body>
</html>
